<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Indawlchuh Scorer</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    /* --------------------------------------------------
       GLOBAL & TYPOGRAPHY
    -------------------------------------------------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #fcfcfc;
      padding: 20px;
      padding-top: 80px; /* Offset for fixed nav */
      color: #111;
      line-height: 1.5;
    }

    /* --------------------------------------------------
       NAVBAR (Glassmorphism)
    -------------------------------------------------- */
    .navbar {
      width: 100%;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #e2e2e7;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
    }

    .logo { font-size: 1.2rem; font-weight: 700; color: #007aff; }

    .nav-links a {
      color: #000;
      text-decoration: none;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .nav-links a:hover { background: #e5e5e7; }

    /* --------------------------------------------------
       HEADER
    -------------------------------------------------- */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h2 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    /* --------------------------------------------------
       SCORE CONTAINERS (MCQ Style)
    -------------------------------------------------- */
    .card {
      background: linear-gradient(to bottom, #d7ecf4 0%, #f5f5f7 100%);
      padding: 24px;
      margin-bottom: 20px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      width: 100%;
    }

    .team-inputs {
      display: flex;
      gap: 20px;
      margin-bottom: 25px;
    }

    .team-input-container {
      flex: 1;
    }

    .team-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 2px solid #007aff;
      font-size: 1.2rem;
      font-weight: 700;
      text-align: center;
      padding: 5px;
      outline: none;
      font-family: inherit;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 15px;
      display: block;
    }

    .sub-label {
      display: block;
      font-size: 0.8rem;
      font-style: italic;
      color: #666;
      margin-bottom: 10px;
    }

    /* --------------------------------------------------
       CUSTOM RADIO BUTTONS
    -------------------------------------------------- */
    .radio-group {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .radio-item input[type="radio"] {
      appearance: none;
      width: 40px;
      height: 40px;
      border: 2px solid #555;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1rem;
      transition: 0.2s;
    }

    .radio-item input[type="radio"]::before {
      content: attr(value);
    }

    .radio-item input[type="radio"]:checked {
      background: #007aff;
      border-color: #007aff;
      color: #fff;
    }

    /* --------------------------------------------------
       PHIT SECTION
    -------------------------------------------------- */
    .phit-section {
      margin: 20px 0;
      padding: 15px;
      border: 1px dashed #007aff;
      border-radius: 8px;
      opacity: 0.2;
      transition: opacity 0.3s;
    }

    .phit-section.active { opacity: 1; background: rgba(255,255,255,0.5); }

    .phit-options {
      display: flex;
      justify-content: space-around;
      font-weight: 600;
    }

    .phit-options label {
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* --------------------------------------------------
       BUTTONS (Apple Pill Style)
    -------------------------------------------------- */
    .btn-container {
      text-align: center;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      margin: 5px;
    }

    .btn-primary { background: #007aff; color: white; }
    .btn-primary:hover { background: #0066d6; }
    .btn-primary:active { transform: scale(0.96); }

    .btn-outline {
      background: transparent;
      border: 2px solid #007aff;
      color: #007aff;
    }
    .btn-outline:hover { background: #007aff; color: white; }

    /* --------------------------------------------------
       SCORE DISPLAY & TABLE
    -------------------------------------------------- */
    .total-score {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
    }

    .table-container {
      max-width: 600px;
      margin: 0 auto 50px auto;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #e2e2e7;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 14px;
      text-align: center;
      border-bottom: 1px solid #e2e2e7;
      font-size: 0.9rem;
    }

    th {
      background: #f5f5f7;
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #86868b;
    }

    #winner-banner {
      background: #34c759;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: 700;
      display: none;
      margin-bottom: 20px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="logo">DawlChuh</div>
  <div class="nav-links">
    <a href="/index.html">Inpui</a>
  </div>
</div>

<div class="header">
  <h2>Indawlchuh <span style="color:#007aff;">Scorer</span></h2>
</div>

<div id="winner-banner"></div>

<div class="card">
  <div class="team-names team-inputs">
    <div class="team-input-container">
      <input type="text" id="nameA" class="team-input" value="Team A">
    </div>
    <div class="team-input-container">
      <input type="text" id="nameB" class="team-input" value="Team B">
    </div>
  </div>

  <div class="dawl-section">
    <div class="dawl-box">
      <span class="section-title" id="labelA">Team A</span>
      <span class="sub-label">dawl hmuh zat</span>
      <div class="radio-group" id="groupA"></div>
    </div>
    
    <div class="dawl-box">
      <span class="section-title" id="labelB">Team B</span>
      <span class="sub-label">dawl hmuh zat</span>
      <div class="radio-group" id="groupB"></div>
    </div>
  </div>

  <div id="phit-container" class="phit-section">
    <span class="section-title" style="margin-bottom: 10px; display: block;">PHIT A CHAK</span>
    <div class="phit-options">
      <label><input type="radio" name="phit" value="A" disabled> <span class="teamA-span">Team A</span></label>
      <label><input type="radio" name="phit" value="B" disabled> <span class="teamB-span">Team B</span></label>
    </div>
  </div>

  <div class="btn-container">
    <button id="add-btn" class="btn btn-primary" onclick="addRound()">Score Belhna</button>
    <button class="btn btn-outline" onclick="resetGame()">Reset Game</button>
  </div>
</div>

<div class="total-score" id="total-display">0 — 0</div>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th id="th-nameA-dawl">A Dawl</th>
        <th id="th-nameB-dawl">B Dawl</th>
        <th id="th-nameA-score">A Score</th>
        <th id="th-nameB-score">B Score</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<script>
  let rows = [];
  let gameOver = false;

  function createRadios(containerId, name) {
    const container = document.getElementById(containerId);
    for (let i = 0; i <= 4; i++) {
      const div = document.createElement('div');
      div.className = 'radio-item';
      div.innerHTML = `
        <input type="radio" name="${name}" id="${name}_${i}" value="${i}" ${i===2?'checked':''} onchange="syncDawls('${name}', ${i})">
      `;
      container.appendChild(div);
    }
  }

  createRadios('groupA', 'dawlA');
  createRadios('groupB', 'dawlB');

  function syncDawls(changedName, value) {
    const otherName = (changedName === 'dawlA') ? 'dawlB' : 'dawlA';
    const remainder = 4 - value;
    document.getElementById(`${otherName}_${remainder}`).checked = true;
    checkPhit();
  }

  const nameAInput = document.getElementById('nameA');
  const nameBInput = document.getElementById('nameB');
  
  function updateLabels() {
    const valA = nameAInput.value;
    const valB = nameBInput.value;

    document.getElementById('labelA').textContent = valA;
    document.getElementById('labelB').textContent = valB;
    document.querySelectorAll('.teamA-span').forEach(s => s.textContent = valA);
    document.querySelectorAll('.teamB-span').forEach(s => s.textContent = valB);

    document.getElementById('th-nameA-dawl').textContent = valA + " Dawl";
    document.getElementById('th-nameB-dawl').textContent = valB + " Dawl";
    document.getElementById('th-nameA-score').textContent = valA + " Score";
    document.getElementById('th-nameB-score').textContent = valB + " Score";
  }

  nameAInput.oninput = updateLabels;
  nameBInput.oninput = updateLabels;

  function checkPhit() {
    const valA = parseInt(document.querySelector('input[name="dawlA"]:checked').value);
    const container = document.getElementById('phit-container');
    const phitRadios = document.querySelectorAll('input[name="phit"]');

    if (valA === 2) {
      container.classList.add('active');
      phitRadios.forEach(r => r.disabled = false);
    } else {
      container.classList.remove('active');
      phitRadios.forEach(r => { r.disabled = true; r.checked = false; });
    }
  }

  function addRound() {
    if (gameOver) return;
    const da = parseInt(document.querySelector('input[name="dawlA"]:checked').value);
    const db = parseInt(document.querySelector('input[name="dawlB"]:checked').value);
    const phit = document.querySelector('input[name="phit"]:checked');

    let sa = 0, sb = 0;
    if (da !== db) {
      sa = (da > db) ? da + 1 : da;
      sb = (db > da) ? db + 1 : db;
    } else {
      if (!phit) { alert("2-2 a ni a, Phit a chak thlang rawh!"); return; }
      sa = (phit.value === 'A') ? da + 1 : da;
      sb = (phit.value === 'B') ? db + 1 : db;
    }

    rows.push({da, db, sa, sb});
    updateUI();
    
    document.getElementById('dawlA_2').checked = true;
    document.getElementById('dawlB_2').checked = true;
    checkPhit();
  }

  function updateUI() {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = "";
    let totalA = 0, totalB = 0;

    [...rows].reverse().forEach(row => {
      totalA += row.sa; totalB += row.sb;
      const tr = `<tr><td>${row.da}</td><td>${row.db}</td><td>${row.sa}</td><td>${row.sb}</td></tr>`;
      tbody.innerHTML += tr;
    });

    document.getElementById('total-display').textContent = `${totalA} — ${totalB}`;

    if (totalA >= 21 || totalB >= 21) {
      const winner = totalA >= 21 ? nameAInput.value : nameBInput.value;
      const banner = document.getElementById('winner-banner');
      banner.style.display = "block";
      banner.textContent = `🎉 ${winner.toUpperCase()} AN chak ee! 🎉`;
      document.getElementById('add-btn').style.display = "none";
      gameOver = true;
    }
  }

  function resetGame() {
    if (confirm("Game thar???")) {
      rows = []; gameOver = false;
      document.getElementById('add-btn').style.display = "inline-block";
      document.getElementById('winner-banner').style.display = "none";
      document.getElementById('dawlA_2').checked = true;
      document.getElementById('dawlB_2').checked = true;
      checkPhit();
      updateUI();
    }
  }
  
  updateLabels();
  checkPhit();
</script>

</body>
</html>
