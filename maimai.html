<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Indawlchuh Scorer</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #007AFF;
      --success: #34C759;
      --danger: #FF3B30;
      --bg: #F2F2F7;
      --card-bg: rgba(255, 255, 255, 0.8);
      --glass: rgba(255, 255, 255, 0.7);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      color: #1C1C1E;
      line-height: 1.4;
      padding: 20px;
      padding-top: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* --- Navbar --- */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 1000;
    }

    .logo { font-weight: 800; font-size: 1.1rem; color: var(--primary); letter-spacing: -0.5px; }
    .nav-link { text-decoration: none; color: #000; font-size: 0.9rem; font-weight: 500; }

    /* --- Match Dashboard --- */
    .match-board {
      width: 100%;
      max-width: 500px;
      background: #000;
      border-radius: 20px;
      padding: 20px;
      color: #fff;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      text-align: center;
    }

    .match-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin-bottom: 10px; font-weight: 700; }
    .match-main { display: flex; justify-content: space-around; align-items: center; }
    .m-team { flex: 1; }
    .m-name { font-size: 0.75rem; font-weight: 600; opacity: 0.8; margin-bottom: 5px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .m-wins { font-size: 2.5rem; font-weight: 800; color: var(--success); line-height: 1; }
    .m-vs { font-size: 0.8rem; opacity: 0.3; font-weight: 300; }

    .match-footer {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: center;
      gap: 20px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
    }
    .m-total-pts { color: #fff; font-weight: 600; }

    /* --- Action Card --- */
    .card {
      width: 100%;
      max-width: 500px;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      margin-bottom: 25px;
    }

    .team-grid { display: flex; gap: 12px; margin-bottom: 25px; }
    .t-input-wrap { flex: 1; position: relative; }
    
    .t-input {
      width: 100%;
      background: rgba(0,0,0,0.04);
      border: 1px solid rgba(0,0,0,0.05);
      border-radius: 12px;
      padding: 12px;
      padding-right: 30px;
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
      outline: none;
      transition: all 0.2s;
    }
    .t-input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(0,122,255,0.1); }

    .edit-icon {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.8rem;
      opacity: 0.3;
      pointer-events: none;
    }

    .control-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: #8E8E93; margin-bottom: 8px; display: block; }

    .dawl-row { display: flex; flex-direction: column; gap: 15px; }
    .radio-group { display: flex; justify-content: center; gap: 8px; }

    .btn-radio input { display: none; }
    .btn-radio label {
      display: flex;
      width: 44px;
      height: 44px;
      background: #fff;
      border: 1px solid #D1D1D6;
      border-radius: 12px;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-radio input:checked + label {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,122,255,0.3);
    }

    /* --- Phit Section --- */
    .phit-box {
      margin: 20px 0;
      padding: 15px;
      background: rgba(0,0,0,0.03);
      border-radius: 15px;
      opacity: 0.2;
      transition: 0.3s;
      pointer-events: none;
    }
    .phit-box.active { opacity: 1; pointer-events: auto; background: rgba(0,122,255,0.05); border: 1px solid rgba(0,122,255,0.1); }
    .phit-ui { display: flex; justify-content: space-around; }
    .phit-ui label { font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 6px; cursor: pointer; }

    /* --- Buttons --- */
    .btn-main {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-undo {
      background: transparent;
      color: var(--primary);
      border: none;
      font-size: 0.8rem;
      font-weight: 600;
      margin-top: 15px;
      cursor: pointer;
      opacity: 0.7;
    }

    /* --- History & Live Score --- */
    .live-score { font-size: 3.5rem; font-weight: 900; margin: 20px 0; letter-spacing: -2px; }
    .history { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
    .game-card { background: #fff; border-radius: 18px; border: 1px solid #E5E5EA; overflow: hidden; }
    .game-header { padding: 14px 20px; background: #F2F2F7; display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 0.85rem; cursor: pointer; }
    .game-header::after { content: '▼'; font-size: 0.6rem; opacity: 0.3; transition: 0.3s; }
    .game-card.collapsed .game-header::after { transform: rotate(-90deg); }
    .game-card.collapsed .game-body { display: none; }

    table { width: 100%; border-collapse: collapse; }
    th { padding: 10px; background: #FAFAFA; font-size: 0.65rem; text-transform: uppercase; color: #8E8E93; border-bottom: 1px solid #F2F2F7; }
    td { padding: 12px; text-align: center; font-size: 0.9rem; border-bottom: 1px solid #F2F2F7; }
    .p-marker { color: var(--primary); font-weight: 800; font-size: 0.7rem; margin-left: 3px; }

    .btn-reset { margin: 50px 0; background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 10px 24px; border-radius: 99px; font-size: 0.8rem; font-weight: 600; cursor: pointer; }

    @media (max-width: 400px) {
      .btn-radio label { width: 38px; height: 38px; }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="logo">Dawlchuh Scorer</div>
    <a href="/index.html" class="nav-link">Inpui Kalna</a>
  </nav>

  <div class="match-board">
    <div class="match-label">Game Scoreboard</div>
    <div class="match-main">
      <div class="m-team">
        <span class="m-name teamA-txt">Team A</span>
        <span class="m-wins" id="m-wins-a">0</span>
      </div>
      <div class="m-vs">VS</div>
      <div class="m-team">
        <span class="m-name teamB-txt">Team B</span>
        <span class="m-wins" id="m-wins-b">0</span>
      </div>
    </div>
    <div class="match-footer">
      <div>Pts Belh Khâwm: <span class="m-total-pts" id="m-pts-a">0</span></div>
      <div style="opacity:0.2">|</div>
      <div>Pts Belh Khâwm: <span class="m-total-pts" id="m-pts-b">0</span></div>
    </div>
  </div>

  <div class="card">
    <span class="control-label" style="text-align: center; margin-bottom: 12px;">Team hming chhutluhna</span>
    <div class="team-grid">
      <div class="t-input-wrap">
        <input type="text" id="in-nameA" class="t-input" placeholder="Team A">
        <span class="edit-icon">✎</span>
      </div>
      <div class="t-input-wrap">
        <input type="text" id="in-nameB" class="t-input" placeholder="Team B">
        <span class="edit-icon">✎</span>
      </div>
    </div>

    <div class="dawl-row">
      <div class="dawl-box">
        <span class="control-label" id="dawl-label-a">Team A dawl hmuh zat</span>
        <div class="radio-group" id="grp-a"></div>
      </div>
      <div class="dawl-box">
        <span class="control-label" id="dawl-label-b">Team B dawl hmuh zat</span>
        <div class="radio-group" id="grp-b"></div>
      </div>
    </div>

    <div id="phit-ui-container" class="phit-box">
      <span class="control-label" style="text-align: center;">Phit a chak</span>
      <div class="phit-ui">
        <label><input type="radio" name="phit" value="A" id="phit-a"> <span class="teamA-txt">Team A</span></label>
        <label><input type="radio" name="phit" value="B" id="phit-b"> <span class="teamB-txt">Team B</span></label>
      </div>
    </div>

    <button class="btn-main" onclick="addRound()">Score Belhna</button>
    <div style="text-align: center;">
      <button class="btn-undo" onclick="undoRound()">Round hmasa sûtna</button>
    </div>
  </div>

  <div class="live-score" id="live-display">0 — 0</div>
  <div class="history" id="match-history"></div>
  <button class="btn-reset" onclick="resetMatch()">Match Pumpuhlûm Reset-na</button>

<script>
  let matchWinsA = 0, matchWinsB = 0, gameNumber = 1, currentRounds = [], pastGames = [], collapsed = {};

  function createRadios(containerId, name) {
    const container = document.getElementById(containerId);
    for (let i = 0; i <= 4; i++) {
      const div = document.createElement('div');
      div.className = 'btn-radio';
      div.innerHTML = `<input type="radio" name="${name}" id="${name}_${i}" value="${i}" ${i===2?'checked':''}>
                       <label for="${name}_${i}" onclick="syncDawls('${name}', ${i})">${i}</label>`;
      container.appendChild(div);
    }
  }

  createRadios('grp-a', 'dawlA');
  createRadios('grp-b', 'dawlB');

  function syncDawls(name, val) {
    const other = (name === 'dawlA') ? 'dawlB' : 'dawlA';
    document.getElementById(`${other}_${4 - val}`).checked = true;
    setTimeout(updatePhitLock, 10);
  }

  function updatePhitLock() {
    const valA = parseInt(document.querySelector('input[name="dawlA"]:checked').value);
    const box = document.getElementById('phit-ui-container');
    const radios = document.querySelectorAll('input[name="phit"]');
    if (valA === 2) { box.classList.add('active'); radios.forEach(r => r.disabled = false); }
    else { box.classList.remove('active'); radios.forEach(r => { r.disabled = true; r.checked = false; }); }
  }

  const nameAInput = document.getElementById('in-nameA'), nameBInput = document.getElementById('in-nameB');
  function refreshNames() {
    const valA = nameAInput.value.trim() || "Team A", valB = nameBInput.value.trim() || "Team B";
    
    // Update simple team name texts
    document.querySelectorAll('.teamA-txt').forEach(t => t.textContent = valA);
    document.querySelectorAll('.teamB-txt').forEach(t => t.textContent = valB);
    
    // Update Dynamic Dawl Labels
    document.getElementById('dawl-label-a').textContent = `${valA} dawl hmuh zat`;
    document.getElementById('dawl-label-b').textContent = `${valB} dawl hmuh zat`;
    
    updateUI();
  }
  nameAInput.oninput = refreshNames; nameBInput.oninput = refreshNames;

  function addRound() {
    const da = parseInt(document.querySelector('input[name="dawlA"]:checked').value), db = parseInt(document.querySelector('input[name="dawlB"]:checked').value);
    const phit = document.querySelector('input[name="phit"]:checked');
    let sa, sb, pw = null;
    if (da !== db) { sa = (da > db) ? da + 1 : da; sb = (db > da) ? db + 1 : db; }
    else { if (!phit) { alert("Phit a chak thlang rawh!"); return; } pw = phit.value; sa = (pw === 'A') ? 3 : 2; sb = (pw === 'B') ? 3 : 2; }
    currentRounds.push({da, db, sa, sb, pw});
    updateUI(); resetInputs();
  }

  function undoRound() {
    if (currentRounds.length > 0) { currentRounds.pop(); updateUI(); }
    else { alert("Round undo tur a awm lo!"); }
  }

  function resetInputs() { document.getElementById('dawlA_2').checked = true; document.getElementById('dawlB_2').checked = true; updatePhitLock(); }
  function toggleCollapse(id) { collapsed[id] = !collapsed[id]; updateUI(); }

  function updateUI() {
    const hist = document.getElementById('match-history'); hist.innerHTML = "";
    let curTotalA = currentRounds.reduce((a, r) => a + r.sa, 0), curTotalB = currentRounds.reduce((a, r) => a + r.sb, 0);

    if (curTotalA >= 21 || curTotalB >= 21) {
      const winner = curTotalA >= 21 ? (nameAInput.value || "Team A") : (nameBInput.value || "Team B");
      alert(`🎉 ${winner.toUpperCase()} AN CHAK E!`);
      if (curTotalA >= 21) matchWinsA++; else matchWinsB++;
      collapsed[gameNumber] = true; pastGames.push({id: gameNumber, rounds: [...currentRounds]});
      currentRounds = []; curTotalA = 0; curTotalB = 0; gameNumber++;
    }

    document.getElementById('m-wins-a').textContent = matchWinsA; document.getElementById('m-wins-b').textContent = matchWinsB;
    const tA = pastGames.reduce((acc, g) => acc + g.rounds.reduce((s, r) => s + r.sa, 0), 0) + curTotalA;
    const tB = pastGames.reduce((acc, g) => acc + g.rounds.reduce((s, r) => s + r.sb, 0), 0) + curTotalB;
    document.getElementById('m-pts-a').textContent = tA; document.getElementById('m-pts-b').textContent = tB;
    document.getElementById('live-display').textContent = `${curTotalA} — ${curTotalB}`;

    if (currentRounds.length > 0) renderGame(gameNumber, currentRounds, hist, false);
    for (let i = pastGames.length - 1; i >= 0; i--) renderGame(pastGames[i].id, pastGames[i].rounds, hist, true);
  }

  function renderGame(id, rounds, container, isHistory) {
    const isCollapsed = collapsed[id] || false;
    const valA = (nameAInput.value.trim() || "A").substring(0, 8), valB = (nameBInput.value.trim() || "B").substring(0, 8);
    const div = document.createElement('div');
    div.className = `game-card ${isCollapsed ? 'collapsed' : ''}`;
    div.innerHTML = `<div class="game-header" onclick="toggleCollapse(${id})">GAME ${id}</div><div class="game-body"><table><thead><tr><th>${valA}</th><th>${valB}</th><th>Score</th><th>Score</th></tr></thead><tbody>${[...rounds].reverse().map(r => `<tr><td>${r.da}</td><td>${r.db}</td><td>${r.sa}${r.pw==='A'?'<span class="p-marker">(P)</span>':''}</td><td>${r.sb}${r.pw==='B'?'<span class="p-marker">(P)</span>':''}</td></tr>`).join('')}</tbody></table></div>`;
    container.appendChild(div);
  }

  function resetMatch() { if (confirm("Match pumpuhlûm Reset i duh maw?")) { matchWinsA = 0; matchWinsB = 0; gameNumber = 1; currentRounds = []; pastGames = []; collapsed = {}; updateUI(); } }
  
  // Initialize labels on load
  refreshNames();
  updatePhitLock();
</script>
</body>
</html>
