<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🍭 LPi Translation ☀️</title>
  <style>
    /* Global Body Style - Pastel Rainbow Heaven */
    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 50%, #FFF9C4 100%);
      background-attachment: fixed;
      color: #555;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Floating Clouds Animation */
    .cloud {
      position: fixed;
      background: white;
      width: 100px;
      height: 40px;
      border-radius: 50px;
      opacity: 0.6;
      z-index: -1;
      animation: drift linear infinite;
    }
    .cloud::after, .cloud::before {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }
    .cloud::after { width: 50px; height: 50px; top: -25px; left: 15px; }
    .cloud::before { width: 40px; height: 40px; top: -15px; left: 45px; }

    @keyframes drift {
      from { transform: translateX(-150px); }
      to { transform: translateX(calc(100vw + 150px)); }
    }

    /* Home Menu Button - Candy Heart Style */
    .home-menu {
      position: fixed;
      top: 15px;
      left: 20px;
      font-size: 1.2em;
      background: #ff69b4;
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      text-decoration: none;
      box-shadow: 0 4px #d81b60, 0 8px 15px rgba(0,0,0,0.1);
      transition: all 0.2s ease;
      z-index: 1001;
      border: 3px solid white;
    }
    .home-menu:hover {
      transform: scale(1.1) rotate(-3deg);
      background: #ff1493;
    }

    /* Animated Rainbow Heading */
    h1 {
      font-size: 3.2em;
      text-align: center;
      margin-top: 60px;
      margin-bottom: 20px;
      background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.1));
      animation: rainbow 5s linear infinite;
      background-size: 200% auto;
    }
    @keyframes rainbow { to { background-position: 200% center; } }

    /* Tables - Marshmallow Soft Style */
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-top: 25px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 25px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      border: 4px solid #fff;
    }
    th {
      background-color: #ffd700;
      color: #ff4500;
      padding: 18px;
      font-size: 1.3em;
      border-bottom: 3px solid #ffb6c1;
    }
    td {
      padding: 15px;
      border-bottom: 1px solid #ffe4e1;
      font-size: 1.1em;
    }
    tr:last-child td { border-bottom: none; }

    /* Contenteditable Cell - Minty Fresh */
    #translationTable td[contenteditable="true"] {
      background: #fafff0;
      border: 3px dashed #b2ff59;
      border-radius: 15px;
      margin: 5px;
      display: block;
      transition: transform 0.2s;
    }
    #translationTable td[contenteditable="true"]:focus {
      outline: none;
      background: #fff;
      transform: scale(1.02);
      border-color: #ff69b4;
    }

    /* Buttons - Gummy Candy Style */
    button, .custom-file-label {
      display: inline-block;
      margin: 5px;
      padding: 15px 25px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: #ff69b4;
      color: white;
      border: 3px solid white;
      border-radius: 50px;
      box-shadow: 0 6px #d81b60;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button:hover:enabled, .custom-file-label:hover {
      background: #ff1493;
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 9px #c71585;
    }

    button:active:enabled {
      transform: translateY(3px);
      box-shadow: 0 2px #c71585;
    }

    #clearProgress { background: #ff4d4d; box-shadow: 0 6px #cc0000; }
    #clearProgress:hover { background: #ff1a1a; box-shadow: 0 9px #b30000; }

    /* File Inputs & Misc */
    .custom-file-input { display: none; }
    .file-name-display {
      font-weight: bold;
      color: #ff1493;
      margin-left: 10px;
      font-size: 0.9em;
    }
    .diff { background-color: #fff0f5 !important; color: #ff0000; font-weight: bold; }

    /* Animated Sunshine */
    .sun {
      position: fixed;
      top: -50px;
      right: -50px;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, #ffeb3b 30%, #fbc02d 60%, transparent 75%);
      border-radius: 50%;
      filter: blur(20px);
      z-index: -2;
      animation: pulse-sun 4s ease-in-out infinite;
    }
    @keyframes pulse-sun {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.2); opacity: 0.9; }
    }

    .button-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="sun"></div>
  <div class="cloud" style="top: 10%; animation-duration: 25s;"></div>
  <div class="cloud" style="top: 30%; animation-duration: 35s; animation-delay: -5s;"></div>
  <div class="cloud" style="top: 15%; animation-duration: 45s; animation-delay: -15s;"></div>

  <a href="/index.html" class="home-menu">🏠 Inpui kalna</a>
  
  <h1>Lianpuii Tool 🍭</h1>
  
  <div id="translationSection">
    <div class="button-row">
      <label class="custom-file-label" for="fileInput">📁 Choose File</label>
      <input type="file" id="fileInput" accept=".tsv" class="custom-file-input">
      <button id="loadTranslation" disabled>✨ Load Table</button>
      <button id="saveProgress">💖 Save Locally</button>
      <button id="downloadFile">🍦 Download TSV</button>
    </div>
    <p style="text-align: center;"><span id="fileInputName" class="file-name-display"></span></p>

    <div class="button-row">
      <label class="custom-file-label" for="fileInput2">🌈 Second File (Optional)</label>
      <input type="file" id="fileInput2" accept=".tsv" class="custom-file-input">
      <button id="displayBoth" disabled>👯 Display Both</button>
      <button id="clearProgress">🔥 Clear Progress</button>
    </div>
    <p style="text-align: center;"><span id="fileInput2Name" class="file-name-display"></span></p>

    <table id="translationTable">
      <thead>
        <tr>
          <th>Original Sentence ☀️</th>
          <th>New Translation 🍭</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  
    <table id="displayTable" style="display: none; margin-top: 20px;">
      <thead>
        <tr id="displayTableHeader">
          <th>Input Sentence</th>
          <th>File 1</th>
          <th>File 2</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    let originalFileName = '';
    let file1 = null, file2 = null;
    let sentences = [], file1Data = [], file2Data = [];

    window.addEventListener('load', function () {
      const saved = localStorage.getItem('savedTranslations');
      if (saved) {
        try {
          sentences = JSON.parse(saved);
          populateTranslationTable();
        } catch (e) { console.error("Error loading data"); }
      }
    });

    document.getElementById('fileInput').addEventListener('change', function (e) {
      file1 = e.target.files[0];
      if(file1) {
        originalFileName = file1.name.replace(/\.tsv$/i, '');
        document.getElementById('fileInputName').textContent = `Loaded: ${file1.name} ✨`;
        document.getElementById('loadTranslation').disabled = false;
      }
      updateCompareBtn();
    });

    document.getElementById('fileInput2').addEventListener('change', function (e) {
      file2 = e.target.files[0];
      if(file2) {
        document.getElementById('fileInput2Name').textContent = `Loaded: ${file2.name} 👯`;
      }
      updateCompareBtn();
    });

    function updateCompareBtn() {
      document.getElementById('displayBoth').disabled = !(file1 && file2);
    }

    document.getElementById('loadTranslation').addEventListener('click', function () {
      if (!file1) return;
      const reader = new FileReader();
      reader.onload = function (e) {
        const lines = e.target.result.split('\n').filter(line => line.includes('\t'));
        sentences = lines.map(line => {
          const [input, translation = ''] = line.split('\t').map(s => s.trim());
          return { input, translation };
        });
        populateTranslationTable();
      };
      reader.readAsText(file1);
    });

    function populateTranslationTable() {
      const tbody = document.querySelector('#translationTable tbody');
      tbody.innerHTML = '';
      document.getElementById('translationTable').style.display = 'table';
      document.getElementById('displayTable').style.display = 'none';

      sentences.forEach((item, index) => {
        const row = document.createElement('tr');
        const inputCell = document.createElement('td');
        inputCell.textContent = item.input;
        row.appendChild(inputCell);

        const transCell = document.createElement('td');
        transCell.contentEditable = true;
        
        if (item.input.trim().startsWith('#')) {
          item.translation = item.input;
        }
        
        transCell.textContent = item.translation;
        transCell.addEventListener('input', () => {
          sentences[index].translation = transCell.textContent.trim();
        });
        row.appendChild(transCell);
        tbody.appendChild(row);
      });
    }

    document.getElementById('saveProgress').addEventListener('click', function () {
      localStorage.setItem('savedTranslations', JSON.stringify(sentences));
      alert('🍬 Yum! Progress saved to your browser!');
    });

    document.getElementById('downloadFile').addEventListener('click', function () {
      const tsvContent = sentences.map(item => `${item.input}\t${item.translation}`).join('\n');
      const blob = new Blob([tsvContent], { type: 'text/tab-separated-values' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (originalFileName || 'Magic') + '_Translated.tsv';
      a.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById('displayBoth').addEventListener('click', function () {
      const reader1 = new FileReader();
      const reader2 = new FileReader();
      
      reader1.onload = (e1) => {
        file1Data = e1.target.result.split('\n').filter(l => l.includes('\t')).map(l => {
          const [input, translation = ''] = l.split('\t').map(s => s.trim());
          return { input, translation };
        });
        reader2.readAsText(file2);
      };

      reader2.onload = (e2) => {
        file2Data = e2.target.result.split('\n').filter(l => l.includes('\t')).map(l => {
          const [input, translation = ''] = l.split('\t').map(s => s.trim());
          return { input, translation };
        });
        renderCompare();
      };
      reader1.readAsText(file1);
    });

    function renderCompare() {
      document.getElementById('translationTable').style.display = 'none';
      const dTable = document.getElementById('displayTable');
      dTable.style.display = 'table';
      const tbody = dTable.querySelector('tbody');
      tbody.innerHTML = '';

      const max = Math.max(file1Data.length, file2Data.length);
      for (let i = 0; i < max; i++) {
        const row = document.createElement('tr');
        const input = file1Data[i]?.input || file2Data[i]?.input || '';
        const t1 = file1Data[i]?.translation || '';
        const t2 = file2Data[i]?.translation || '';
        
        if (t1 !== t2) row.classList.add('diff');
        
        row.innerHTML = `<td>${input}</td><td>${t1}</td><td>${t2}</td>`;
        tbody.appendChild(row);
      }
    }

    document.getElementById("clearProgress").addEventListener("click", () => {
      if (confirm("🍭 Wipe away the candy? (Clear Progress)")) {
        localStorage.removeItem("savedTranslations");
        location.reload();
      }
    });
  </script>
</body>
</html>
