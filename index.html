<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inpui | Ralaa</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">

    <style>
        :root {
            --puan-red: #BE1E2D;
            --puan-green: #006837;
            --puan-black: #1A1A1B;
            --puan-yellow: #FBB03B;
            --bg: #FFFFFF;
            --text: #1A1A1B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- Puanchei Decorative Header --- */
        .puan-border-top {
            width: 100%;
            height: 12px;
            background: repeating-linear-gradient(
                90deg,
                var(--puan-red) 0, var(--puan-red) 40%,
                var(--puan-black) 40%, var(--puan-black) 45%,
                var(--puan-green) 45%, var(--puan-green) 55%,
                var(--puan-yellow) 55%, var(--puan-yellow) 57%,
                var(--puan-black) 57%, var(--puan-black) 100%
            );
            background-size: 200px 100%;
            border-bottom: 2px solid var(--puan-black);
            margin-bottom: 60px;
        }

        /* --- Header Section --- */
        .header {
            width: 100%;
            max-width: 450px;
            text-align: left;
            padding: 0 20px;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 0.8;
            color: var(--puan-black);
            letter-spacing: -3px;
        }

        .chibai-accent {
            color: var(--puan-red);
            font-style: italic;
        }

        /* --- List Content --- */
        .content {
            width: 100%;
            max-width: 450px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
        }

        .item-link {
            text-decoration: none;
            color: var(--text);
            padding: 25px 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            position: relative;
        }

        .item-link:first-child {
            border-top: 4px solid var(--puan-black);
        }

        /* The Pattern Indicator (Mimics the diamond weaving) */
        .pattern-dot {
            width: 8px;
            height: 8px;
            background: var(--puan-black);
            margin-right: 20px;
            transform: rotate(45deg);
            transition: all 0.3s ease;
        }

        .item-title {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: -0.3px;
        }

        /* --- Hover States --- */
        .item-link:hover {
            padding-left: 10px;
        }

        .item-link:hover .pattern-dot {
            background: var(--puan-red);
            box-shadow: 12px 0 0 var(--puan-green), -12px 0 0 var(--puan-yellow);
        }

        .item-link:hover .item-title {
            color: var(--puan-red);
            font-weight: 600;
        }

        /* --- Bottom Decorative Bar --- */
        .footer-spacer { flex-grow: 1; }
        
        .puan-border-bottom {
            width: 100%;
            height: 40px;
            margin-top: 60px;
            background-color: var(--puan-red);
            position: relative;
            overflow: hidden;
        }

        .puan-border-bottom::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                45deg,
                rgba(0,0,0,0.1),
                rgba(0,0,0,0.1) 10px,
                transparent 10px,
                transparent 20px
            );
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 480px) {
            h1 { font-size: 3.5rem; }
            .header { margin-top: 20px; }
            .item-title { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="puan-border-top"></div>

    <div class="header">
        <h1>Chi<span class="chibai-accent">bai!</span></h1>
    </div>

    <div class="content">
        <a href="/translation-tool.html" class="item-link">
            <div class="pattern-dot"></div>
            <span class="item-title">LPi Translation Tool</span>
        </a>
        
        <a href="/maimai.html" class="item-link">
            <div class="pattern-dot"></div>
            <span class="item-title">DawlChuh Scorer</span>
        </a>
        
        <a href="/MCQs.html" class="item-link">
            <div class="pattern-dot"></div>
            <span class="item-title">Python MCQs</span>
        </a>
        
        <a href="/suk.html" class="item-link">
            <span class="pattern-dot"></span>
            <span class="item-title">Sukoon Foods</span>
        </a>
    </div>

    <div class="footer-spacer"></div>
    <div class="puan-border-bottom"></div>

</body>
</html>
