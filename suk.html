<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sukoon | Food Diary</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #c5a059; /* Gold accent */
      --dark: #1a1a1a;
      --light: #fdfaf5;
      --text-muted: #666;
      --glass: rgba(255, 255, 255, 0.8);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--light);
      background-image: 
        radial-gradient(circle at 2px 2px, rgba(197, 160, 89, 0.1) 1px, transparent 0);
      background-size: 40px 40px;
      font-family: 'Poppins', sans-serif;
      color: var(--dark);
      line-height: 1.6;
    }

    /* Elegant Floating Navigation */
    .nav-container {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 20px 40px;
      display: flex;
      justify-content: flex-end;
      z-index: 1000;
      background: linear-gradient(to bottom, rgba(253, 250, 245, 1), rgba(253, 250, 245, 0));
    }

    .inpui-btn {
      background: var(--dark);
      color: #fff;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 600;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 1px solid transparent;
    }

    .inpui-btn:hover {
      background: var(--primary);
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(197, 160, 89, 0.3);
    }

    header {
      padding: 120px 20px 60px;
      text-align: center;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      color: var(--dark);
      margin-bottom: 10px;
      font-weight: 700;
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 4px;
      font-weight: 400;
    }

    /* Food Grid */
    .food-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 40px;
      padding: 0 40px 100px;
      max-width: 1300px;
      margin: 0 auto;
    }

    .food-card {
      background: var(--glass);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(197, 160, 89, 0.2);
      border-radius: 0; /* Professional sharp look or use 20px for soft */
      padding: 20px;
      transition: all 0.5s ease;
      position: relative;
      opacity: 0;
      transform: translateY(30px);
    }

    .food-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .food-card:hover {
      border-color: var(--primary);
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
      transform: translateY(-10px);
    }

    .img-wrapper {
      overflow: hidden;
      height: 250px;
      margin-bottom: 20px;
      position: relative;
    }

    .food-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.8s ease;
    }

    .food-card:hover img {
      transform: scale(1.1);
    }

    .food-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .plates-badge {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(197, 160, 89, 0.1);
      color: var(--primary);
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 15px;
    }

    /* Custom Ribbon */
    .status-ribbon {
      position: absolute;
      top: 0;
      right: 0;
      background: var(--primary);
      color: white;
      padding: 5px 15px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .fallback {
      background: #eee;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      text-align: center;
      padding: 20px;
    }

    footer {
      padding: 60px 20px;
      background: var(--dark);
      color: rgba(255,255,255,0.5);
      text-align: center;
      font-size: 0.8rem;
      letter-spacing: 1px;
    }

    /* Animations */
    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .food-container { padding: 0 20px 60px; }
      h1 { font-size: 2.5rem; }
      .nav-container { padding: 15px 20px; }
    }
  </style>
</head>
<body>

  <nav class="nav-container">
    <a href="index.html" class="inpui-btn">Inpui</a>
  </nav>

  <header>
    <p class="subtitle">1st Night-a kan thil ei</p>
    <h1>Sukoon Diaries</h1>
  </header>

  <main>
    <div class="food-container" id="food-list">
      </div>
  </main>

  <footer>
    TRIPPA TROPPA TRALALA &bull; 2026 &bull; BONECA TUNG TUNG
  </footer>

  <script>
    fetch('food.xml')
      .then(response => response.text())
      .then(str => (new window.DOMParser()).parseFromString(str, "text/xml"))
      .then(data => {
        const items = data.getElementsByTagName("food");
        const container = document.getElementById("food-list");

        for (let i = 0; i < items.length; i++) {
          const item = items[i];
          const name = item.getElementsByTagName("name")[0].textContent;
          const plates = item.getElementsByTagName("plates")[0].textContent;
          const image = item.getElementsByTagName("image")[0]?.textContent || "";

          const card = document.createElement('div');
          card.className = 'food-card';
          // Delay animation for each card
          setTimeout(() => card.classList.add('visible'), i * 150);

          const imgWrapper = document.createElement('div');
          imgWrapper.className = 'img-wrapper';

          const img = document.createElement('img');
          img.src = image;
          img.alt = name;
          img.onerror = function () {
            const fallback = document.createElement('div');
            fallback.className = 'fallback';
            fallback.innerText = "IMAGE ARCHIVED";
            this.replaceWith(fallback);
          };

          const ribbon = document.createElement('div');
          ribbon.className = 'status-ribbon';
          ribbon.textContent = 'Featured';

          const title = document.createElement('h3');
          title.textContent = name;

          const plateBadge = document.createElement('div');
          plateBadge.className = 'plates-badge';
          plateBadge.textContent = `${plates} Serving${plates > 1 ? 's' : ''}`;

          imgWrapper.appendChild(img);
          card.appendChild(ribbon);
          card.appendChild(imgWrapper);
          card.appendChild(plateBadge);
          card.appendChild(title);

          container.appendChild(card);
        }
      })
      .catch(error => {
        document.getElementById('food-list').innerHTML = '<p style="text-align:center; width:100%;">Menu currently unavailable. Please check back later.</p>';
        console.error(error);
      });
  </script>
</body>
</html>
